<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Dashboard Corporativo</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><h2>Servi<span>flex</span></h2></div>
            <nav class="menu">
                <a href="admin.html" class="active"><i class="fa-solid fa-chart-pie"></i> Resumo Geral</a>
                <a href="clients.html"><i class="fa-solid fa-users"></i> CRM Clientes</a>
                <a href="appointments.html"><i class="fa-solid fa-calendar-days"></i> Agendamentos</a>
                <a href="promotions.html"><i class="fa-solid fa-robot"></i> Campanhas IA</a>
                <a href="profile.html"><i class="fa-solid fa-gears"></i> Perfil</a>
            </nav>
            <div class="theme-switch-wrapper">
                <label class="theme-switch">
                    <input type="checkbox">
                    <div class="slider"></div>
                </label>
                <span>Modo Escuro</span>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-header"><h1>Métricas Gerais do Estabelecimento</h1></header>
            <div class="dashboard-cards">
                <div class="card"><div class="card-icon"><i class="fa-solid fa-user-group"></i></div><div><h3 id="total-clientes">0</h3><p>Clientes Totais</p></div></div>
                <div class="card"><div class="card-icon" style="color: #eab308;"><i class="fa-solid fa-crown"></i></div><div><h3 id="clientes-gold">0</h3><p>Fidelidade Gold</p></div></div>
                <div class="card"><div class="card-icon" style="color: #10b981;"><i class="fa-solid fa-wallet"></i></div><div><h3 id="faturamento-simulado">R$ 0,00</h3><p>Engajamento Estimado</p></div></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
